services:
  backend:
    image: ptxuan/bookora-api:${IMAGE_TAG:-latest}
    container_name: nestjs-backend
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - '3000:3000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://localhost:3000/api/v1/health || wget -qO- http://localhost:3000/api/health || exit 1',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - bookora_network

networks:
  bookora_network:
    driver: bridge
