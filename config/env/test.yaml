app:
  name: Exam API
  port: 3000
  apiPrefix: api
  corsOrigin: http://localhost:5173
  frontendUrl: http://localhost:5173

database:
  url: postgresql://postgres:password@localhost:5432/ecommerce_db

environment:
  nodeEnv: test

cookie:
  domain: ''
  secret: change-me-cookie-secret

auth:
  jwt:
    accessSecret: change-me-access
    refreshSecret: change-me-refresh
    refreshTokenHashSecret: change-me-refresh-token-hash-secret
    accessExpiresIn: 15m
    refreshExpiresIn: 7d
  login:
    emailMaxFailedAttempts: 5
    emailLockSeconds: 60
    ipMaxFailedAttempts: 10
    ipLockSeconds: 300
    attemptWindowSeconds: 60
  throttle:
    login:
      ttlSeconds: 60
      limit: 30
    register:
      ttlSeconds: 60
      limit: 10
    refresh:
      ttlSeconds: 60
      limit: 10
    csrf:
      ttlSeconds: 60
      limit: 10
  google:
    clientId: test-client-id
    clientSecret: test-client-secret
    callbackUrl: http://localhost:3000/api/v1/auth/google/callback
  turnstile:
    enabled: false
    secretKey: '0x4AAAAAADUU-76Tm3XoYCxyiXXhveAqhAA'
    siteverifyUrl: https://challenges.cloudflare.com/turnstile/v0/siteverify
