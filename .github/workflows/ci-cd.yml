name: CI/CD Backend

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ecommerce_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/ecommerce_db?schema=public
      JWT_ACCESS_SECRET: access_secret
      JWT_REFRESH_SECRET: refresh_secret
      REFRESH_TOKEN_HASH_SECRET: refresh_hash_secret
      GOOGLE_CLIENT_ID: test_google_client_id
      GOOGLE_CLIENT_SECRET: test_google_client_secret

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run migrations for test database
        run: npx prisma migrate deploy --schema=prisma/schema

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit test
        run: npm run test -- --passWithNoTests

      - name: E2E test
        run: npm run test:e2e -- --passWithNoTests

      - name: Build project
        run: npm run build

  security-report:
    name: Security Report
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Scan source code with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Build Docker image for scan
        run: |
          docker build \
            --build-arg DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -t bookora-api-backend:${{ github.sha }} .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bookora-api-backend:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 0

  docker-build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: security-report

    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bookora-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bookora-api:${{ github.sha }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker-build-push

    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VPS_APP_DIR }}

            git fetch origin
            git reset --hard origin/master

            docker compose pull backend

            echo "Run Prisma migrate"
            docker compose run --rm --no-deps backend npx prisma migrate deploy --schema=prisma/schema

            echo "Restart backend"
            docker compose up -d --no-deps backend

            docker compose ps
            docker logs nestjs-backend --tail 100

            echo "Waiting for backend health check..."

            for i in {1..30}; do
              if  curl -fsS http://localhost:3000/api/v1/health; then
                echo "Backend is healthy"
                exit 0
              fi

              echo "Backend not ready yet... retry $i/30"
              sleep 3
            done

            echo "Backend health check failed"
            docker compose ps
            docker logs nestjs-backend --tail 100
            exit 1

            docker image prune -f

  workflow-report:
    name: Workflow Report
    runs-on: ubuntu-latest
    needs:
      - build-and-test
      - security-report
      - deploy

    if: always()

    steps:
      - name: Show workflow result
        run: |
          echo "Build and Test: ${{ needs.build-and-test.result }}"
          echo "Security Report: ${{ needs.security-report.result }}"
          echo "Deploy: ${{ needs.deploy.result }}"
