services:
  minio:
    image: minio/minio:latest
    container_name: bookora-minio-dev
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password_dev
    volumes:
      - minio_dev_data:/data

volumes:
  minio_dev_data:
